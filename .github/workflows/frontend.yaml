name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/client/**'

jobs:
  frontend-build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/client

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build